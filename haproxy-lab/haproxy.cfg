global
    log /dev/log local0
    log /dev/log local1 notice
    daemon
    maxconn 2048

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option log-health-checks
    timeout connect 5s
    timeout client 30s
    timeout server 30s

#---------------------------------------------------------------------
# Frontend : point d'entrée HTTP
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    default_backend web_back

#---------------------------------------------------------------------
# Backend : Weighted Round Robin
# srv-web1 : poids 3 → 75% du trafic
# srv-web2 : poids 1 → 25% du trafic
#---------------------------------------------------------------------
backend web_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server web1 10.10.10.10:80 check weight 3
    server web2 10.10.10.20:80 check weight 1

#---------------------------------------------------------------------
# Interface de statistiques
#---------------------------------------------------------------------
listen stats
    bind *:8080
    stats enable
    stats uri /stats
    stats refresh 5s
    stats realm HAProxy\ Statistics
    stats auth ha-admin:Azerty/123
